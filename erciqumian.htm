<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高等数学：二次曲面大全 (双叶双曲面彻底修正为完整两叶)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;

        #controls-panel {

        }
        .control-card {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 15px 25px;
            color: #eee;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: flex;

            flex-wrap: wrap;

        }
        .control-group {
            display: flex;

        .control-item {

        }
        #note {
            position: absolute;
            bottom: 10px;

            padding: 4px 12px;

        }
        @media (max-width: 1200px) {
            .control-card { flex-direction: column; align-items: stretch; gap: 15px; }
            .control-group { justify-content: space-between; }
            #info { max-width: 300px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>📐 二次曲面大全 · 截痕法演示</h1>
        <p>包含7种典型曲面：椭球面 · 单叶/双叶双曲面 · 椭圆/旋转抛物面 · 双曲抛物面 · 圆锥面</p>
        <div class="instruction">
            <strong>🖱️ 操作说明:</strong><br>
            • 鼠标拖拽旋转视角 | 滚轮缩放<br>
            • 选择曲面/截平面 | 滑块调节截距<br>
            • 自定义颜色 | 网格密度 | 显示模式<br>
            • 红色曲线为精确截痕 (无交线时自动隐藏)
        </div>
    </div>
    <div id="controls-panel">
        <div class="control-card">
            <!-- 第一行：曲面与截平面选择 -->
            <div class="control-group">
                <div class="control-item">
                    <label>🔍 曲面</label>
                    <select id="surface-select">
                        <option value="ellipsoid">🌍 椭球面 (x²/4 + y²/9 + z²/2 = 1)</option>
                        <option value="hyperboloid1">⏳ 单叶双曲面 (x²/4 + y²/9 - z²/4 = 1)</option>
                        <option value="hyperboloid2" selected>⌛ 双叶双曲面 (x²/4 - y²/9 - z²/4 = 1)</option>
                        <option value="paraboloid">🥣 椭圆抛物面 (z = x²/3 + y²/4)</option>
                        <option value="rotationalParaboloid">🌀 旋转抛物面 (z = x² + y²)</option>
                        <option value="hyperbolicParaboloid">🐎 双曲抛物面 (z = x²/4 - y²/4)</option>
                        <option value="cone">🔺 圆锥面 (z² = x²/4 + y²/9)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>✂️ 截平面</label>
                    <select id="plane-select">
                        <option value="xy" selected>z = 常数 (水平面)</option>
                        <option value="xz">y = 常数 (侧平面)</option>
                        <option value="yz">x = 常数 (正平面)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>📏 截距</label>
                    <input type="range" id="slice-value" min="-4.0" max="4.0" step="0.05" value="2.0">
                    <span id="slice-display" class="value-badge">2.00</span>
                </div>
            </div>
            <!-- 第二行：颜色与网格控制 -->
            <div class="control-group">
                <div class="control-item">
                    <label>🎨 曲面颜色</label>
                    <input type="color" id="color-picker" value="#aa66cc">
                </div>
                <div class="control-item">
                    <label>▦ 网格密度</label>
                    <input type="range" id="grid-density" min="0" max="40" step="1" value="20">
                    <span id="density-display" class="value-badge">20</span>
                </div>
                <div class="control-item">
                    <label>👁️ 显示模式</label>
                    <select id="display-mode">
                        <option value="wire+face" selected>网格+面色</option>
                        <option value="wire-only">仅网格</option>
                        <option value="face-only">仅面色</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div id="note">⚡ 红色高亮为截痕 | 双叶双曲面已彻底修正为独立两叶</div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11131f);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 0.6);
        backLight.position.set(-5, 0, 5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(3, 1, 3);
        scene.add(fillLight);

        // --- 辅助网格和轴线 ---
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(8);
        scene.add(axesHelper);

        function createAxisLabel(text, color, position) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 2px black';
            const label = new CSS2DObject(div);
            label.position.copy(position);
            return label;
        }
        scene.add(createAxisLabel('X', '#ff6666', new THREE.Vector3(8, 0.2, 0)));
        scene.add(createAxisLabel('Y', '#66ff66', new THREE.Vector3(0, 7, 0)));
        scene.add(createAxisLabel('Z', '#6666ff', new THREE.Vector3(0, 0.2, 7)));

        // --- 星星背景 ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 30 + Math.random() * 30;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0x99aacc, size: 0.15 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- 核心数据组 ---
        let surfaceGroup = new THREE.Group();
        let planeGroup = new THREE.Group();
        let intersectionGroup = new THREE.Group();
        scene.add(surfaceGroup);
        scene.add(planeGroup);
        scene.add(intersectionGroup);

        // --- 工具函数：生成参数化曲面的顶点 (彻底修正双叶双曲面) ---
        function generateSurfaceVertices(surfaceType, density) {
            const vertices = [];
            const indices = [];
            
            // 定义参数方程和范围
            let paramFunc, uRange, vRange;
            const uSegs = Math.max(4, Math.floor(density * 1.5));
            const vSegs = Math.max(4, Math.floor(density * 1.5));
            
            switch(surfaceType) {
                case 'ellipsoid':
                    paramFunc = (u, v) => new THREE.Vector3(2 * Math.sin(u) * Math.cos(v), 3 * Math.sin(u) * Math.sin(v), Math.sqrt(2) * Math.cos(u));
                    uRange = [0, Math.PI]; vRange = [0, 2*Math.PI];
                    break;
                case 'hyperboloid1':
                    paramFunc = (u, v) => new THREE.Vector3(2 * Math.cosh(u) * Math.cos(v), 3 * Math.cosh(u) * Math.sin(v), 2 * Math.sinh(u));
                    uRange = [-1.5, 1.5]; vRange = [0, 2*Math.PI];
                    break;
                case 'hyperboloid2':
                    // 双叶双曲面标准方程: x^2/4 - y^2/9 - z^2/4 = 1
                    // 参数化：右叶 (x > 0): x = 2 * cosh(u), y = 3 * sinh(u) * cos(v), z = 2 * sinh(u) * sin(v)
                    //        左叶 (x < 0): x = -2 * cosh(u), y = 3 * sinh(u) * cos(v), z = 2 * sinh(u) * sin(v)
                    // u范围需要足够大以覆盖双叶的延伸
                    uRange = [0, 2.2]; // cosh(0)=1, cosh(2.2)≈4.5, sinh(2.2)≈4.4
                    vRange = [0, 2*Math.PI];
                    
                    // 分别生成左右两叶
                    // 右叶
                    for (let sign of [1, -1]) {
                        const grid = [];
                        for (let i = 0; i <= uSegs; i++) {
                            const u = uRange[0] + i * (uRange[1] - uRange[0]) / uSegs;
                            const row = [];
                            for (let j = 0; j <= vSegs; j++) {
                                const v = vRange[0] + j * (vRange[1] - vRange[0]) / vSegs;
                                try {
                                    const p = new THREE.Vector3(
                                        sign * 2 * Math.cosh(u),
                                        3 * Math.sinh(u) * Math.cos(v),
                                        2 * Math.sinh(u) * Math.sin(v)
                                    );
                                    row.push(p);
                                    vertices.push(p.x, p.y, p.z);
                                } catch(e) { 
                                    row.push(null); 
                                    vertices.push(0,0,0);
                                }
                            }
                            grid.push(row);
                        }
                        
                        // 为当前叶生成索引
                        const offset = (sign === 1 ? 0 : (uSegs+1)*(vSegs+1));
                        for (let i = 0; i < uSegs; i++) {
                            for (let j = 0; j < vSegs; j++) {
                                const a = offset + i * (vSegs+1) + j;
                                const b = offset + i * (vSegs+1) + j + 1;
                                const c = offset + (i+1) * (vSegs+1) + j;
                                const d = offset + (i+1) * (vSegs+1) + j + 1;
                                
                                if (grid[i][j] && grid[i][j+1] && grid[i+1][j]) {
                                    indices.push(a, b, c);
                                }
                                if (grid[i][j+1] && grid[i+1][j+1] && grid[i+1][j]) {
                                    indices.push(b, d, c);
                                }
                            }
                        }
                    }
                    return { vertices, indices };
                    
                case 'paraboloid':
                    paramFunc = (r, v) => new THREE.Vector3(Math.sqrt(3)*r * Math.cos(v), 2*r * Math.sin(v), r*r);
                    uRange = [0, 2.2]; vRange = [0, 2*Math.PI];
                    break;
                case 'rotationalParaboloid':
                    paramFunc = (r, v) => new THREE.Vector3(r * Math.cos(v), r * Math.sin(v), r*r);
                    uRange = [0, 2.2]; vRange = [0, 2*Math.PI];
                    break;
                case 'hyperbolicParaboloid':
                    paramFunc = (u, v) => new THREE.Vector3(2*u, 2*v, u*u - v*v);
                    uRange = [-2, 2]; vRange = [-2, 2];
                    break;
                case 'cone':
                    paramFunc = (u, v) => new THREE.Vector3(2 * u * Math.cos(v), 3 * u * Math.sin(v), u);
                    uRange = [-2.5, 2.5]; vRange = [0, 2*Math.PI];
                    break;
                default:
                    return { vertices: [], indices: [] };
            }
            
            // 其他曲面的通用处理
            const uStep = (uRange[1] - uRange[0]) / uSegs;
            const vStep = (vRange[1] - vRange[0]) / vSegs;
            
            const grid = [];
            for (let i = 0; i <= uSegs; i++) {
                const u = uRange[0] + i * uStep;
                const row = [];
                for (let j = 0; j <= vSegs; j++) {
                    const v = vRange[0] + j * vStep;
                    try {
                        const p = paramFunc(u, v);
                        row.push(p);
                        vertices.push(p.x, p.y, p.z);
                    } catch(e) { 
                        row.push(null); 
                        vertices.push(0,0,0);
                    }
                }
                grid.push(row);
            }
            
            // 生成三角形索引
            for (let i = 0; i < uSegs; i++) {
                for (let j = 0; j < vSegs; j++) {
                    const a = i * (vSegs+1) + j;
                    const b = i * (vSegs+1) + j + 1;
                    const c = (i+1) * (vSegs+1) + j;
                    const d = (i+1) * (vSegs+1) + j + 1;
                    
                    if (grid[i][j] && grid[i][j+1] && grid[i+1][j]) {
                        indices.push(a, b, c);
                    }
                    if (grid[i][j+1] && grid[i+1][j+1] && grid[i+1][j]) {
                        indices.push(b, d, c);
                    }
                }
            }
            
            return { vertices, indices };
        }

        // --- 工具函数：计算截痕点 (精确) ---
        function computeIntersectionPoints(surfaceType, planeType, sliceVal) {
            const points = [];
            const steps = 200;
            
            try {
                switch(surfaceType) {
                    case 'ellipsoid':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            const C = 1 - z*z/2;
                            if (C < 0) return [];
                            const rx = Math.sqrt(4 * C);
                            const ry = Math.sqrt(9 * C);
                            if (rx <= 0 || ry <= 0) return [];
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(rx * Math.cos(t), ry * Math.sin(t), z));
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            const C = 1 - y*y/9;
                            if (C < 0) return [];
                            const rx = Math.sqrt(4 * C);
                            const rz = Math.sqrt(2 * C);
                            if (rx <= 0 || rz <= 0) return [];
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(rx * Math.cos(t), y, rz * Math.sin(t)));
                            }
                        } else {
                            const x = sliceVal;
                            const C = 1 - x*x/4;
                            if (C < 0) return [];
                            const ry = Math.sqrt(9 * C);
                            const rz = Math.sqrt(2 * C);
                            if (ry <= 0 || rz <= 0) return [];
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(x, ry * Math.cos(t), rz * Math.sin(t)));
                            }
                        }
                        break;
                        
                    case 'hyperboloid1':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            const C = 1 + z*z/4;
                            const rx = Math.sqrt(4 * C);
                            const ry = Math.sqrt(9 * C);
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(rx * Math.cos(t), ry * Math.sin(t), z));
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            const C = 1 - y*y/9;
                            if (C < -0.01) return [];
                            if (Math.abs(C) < 0.01) {
                                for (let i = 0; i <= 100; i++) {
                                    const t = -3 + (i/100)*6;
                                    points.push(new THREE.Vector3(t, y, t));
                                    points.push(new THREE.Vector3(-t, y, t));
                                }
                            } else {
                                const sqrtC = Math.sqrt(C);
                                const a = 2 * sqrtC;
                                for (let i = 0; i <= steps; i++) {
                                    const u = -2.5 + (i/steps)*5;
                                    const coshU = Math.cosh(u);
                                    const sinhU = Math.sinh(u);
                                    points.push(new THREE.Vector3(a * coshU, y, a * sinhU));
                                    points.push(new THREE.Vector3(-a * coshU, y, a * sinhU));
                                }
                            }
                        } else {
                            const x = sliceVal;
                            const C = 1 - x*x/4;
                            if (C < -0.01) return [];
                            if (Math.abs(C) < 0.01) {
                                for (let i = 0; i <= 100; i++) {
                                    const t = -3.5 + (i/100)*7;
                                    points.push(new THREE.Vector3(x, t, t));
                                    points.push(new THREE.Vector3(x, -t, t));
                                }
                            } else {
                                const sqrtC = Math.sqrt(C);
                                const a = 3 * sqrtC;
                                const b = 2 * sqrtC;
                                for (let i = 0; i <= steps; i++) {
                                    const u = -2.5 + (i/steps)*5;
                                    const coshU = Math.cosh(u);
                                    const sinhU = Math.sinh(u);
                                    points.push(new THREE.Vector3(x, a * coshU, b * sinhU));
                                    points.push(new THREE.Vector3(x, -a * coshU, b * sinhU));
                                }
                            }
                        }
                        break;
                        
                    case 'hyperboloid2':
                        // 双叶双曲面 x^2/4 - y^2/9 - z^2/4 = 1
                        if (planeType === 'xy') { // z = constant
                            const z = sliceVal;
                            const C = 1 + z*z/4; // x^2/4 - y^2/9 = 1 + z^2/4
                            // 双曲线两支，对应左右两叶
                            const a = 2 * Math.sqrt(C);
                            for (let i = 0; i <= steps; i++) {
                                const t = -3 + (i/steps)*6;
                                const y = t;
                                const x = Math.sqrt(4 * (C + y*y/9));
                                if (!isNaN(x)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    points.push(new THREE.Vector3(-x, y, z));
                                }
                            }
                        } else if (planeType === 'xz') { // y = constant
                            const y = sliceVal;
                            const C = 1 + y*y/9; // x^2/4 - z^2/4 = 1 + y^2/9
                            if (C < 0) return [];
                            const a = 2 * Math.sqrt(C);
                            // 双曲线两支
                            for (let i = 0; i <= steps; i++) {
                                const t = -3 + (i/steps)*6;
                                const z = t;
                                const x = Math.sqrt(4 * (C + z*z/4));
                                if (!isNaN(x)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    points.push(new THREE.Vector3(-x, y, z));
                                }
                            }
                        } else { // x = constant
                            const x = sliceVal;
                            const C = x*x/4 - 1; // y^2/9 + z^2/4 = x^2/4 - 1
                            if (C < 0) return [];
                            const ry = Math.sqrt(9 * C);
                            const rz = Math.sqrt(4 * C);
                            if (ry <= 0 || rz <= 0) return [];
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(x, ry * Math.cos(t), rz * Math.sin(t)));
                            }
                        }
                        break;
                        
                    case 'paraboloid':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            if (z < 0) return [];
                            const rx = Math.sqrt(3 * z);
                            const ry = Math.sqrt(4 * z);
                            if (rx <= 0 || ry <= 0) return [];
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(rx * Math.cos(t), ry * Math.sin(t), z));
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            const y2_4 = y*y/4;
                            for (let i = 0; i <= steps; i++) {
                                const z = y2_4 + (i/steps)*6;
                                const x = Math.sqrt(3 * (z - y2_4));
                                if (!isNaN(x)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (x > 0.01) points.push(new THREE.Vector3(-x, y, z));
                                }
                            }
                        } else {
                            const x = sliceVal;
                            const x2_3 = x*x/3;
                            for (let i = 0; i <= steps; i++) {
                                const z = x2_3 + (i/steps)*6;
                                const y = Math.sqrt(4 * (z - x2_3));
                                if (!isNaN(y)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (y > 0.01) points.push(new THREE.Vector3(x, -y, z));
                                }
                            }
                        }
                        break;
                        
                    case 'rotationalParaboloid':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            if (z < 0) return [];
                            const r = Math.sqrt(z);
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(r * Math.cos(t), r * Math.sin(t), z));
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            for (let i = 0; i <= steps; i++) {
                                const z = (i/steps)*5;
                                const x = Math.sqrt(z - y*y);
                                if (!isNaN(x) && z >= y*y) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (x > 0.01) points.push(new THREE.Vector3(-x, y, z));
                                }
                            }
                        } else {
                            const x = sliceVal;
                            for (let i = 0; i <= steps; i++) {
                                const z = (i/steps)*5;
                                const y = Math.sqrt(z - x*x);
                                if (!isNaN(y) && z >= x*x) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (y > 0.01) points.push(new THREE.Vector3(x, -y, z));
                                }
                            }
                        }
                        break;
                        
                    case 'hyperbolicParaboloid':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            if (Math.abs(z) < 0.001) {
                                for (let i = 0; i <= steps; i++) {
                                    const t = -3 + (i/steps)*6;
                                    points.push(new THREE.Vector3(t, t, 0));
                                    points.push(new THREE.Vector3(t, -t, 0));
                                }
                            } else if (z > 0) {
                                const a = 2 * Math.sqrt(z);
                                for (let i = 0; i <= steps; i++) {
                                    const u = -2.5 + (i/steps)*5;
                                    const coshU = Math.cosh(u);
                                    const sinhU = Math.sinh(u);
                                    points.push(new THREE.Vector3(a * coshU, a * sinhU, z));
                                    points.push(new THREE.Vector3(-a * coshU, a * sinhU, z));
                                }
                            } else {
                                const a = 2 * Math.sqrt(-z);
                                for (let i = 0; i <= steps; i++) {
                                    const u = -2.5 + (i/steps)*5;
                                    const coshU = Math.cosh(u);
                                    const sinhU = Math.sinh(u);
                                    points.push(new THREE.Vector3(a * sinhU, a * coshU, z));
                                    points.push(new THREE.Vector3(a * sinhU, -a * coshU, z));
                                }
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            const y2_4 = y*y/4;
                            for (let i = 0; i <= steps; i++) {
                                const z = -y2_4 + (i/steps)*8;
                                const x2 = 4 * (z + y2_4);
                                if (x2 >= 0) {
                                    const x = Math.sqrt(x2);
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (x > 0.01) points.push(new THREE.Vector3(-x, y, z));
                                }
                            }
                        } else {
                            const x = sliceVal;
                            const x2_4 = x*x/4;
                            for (let i = 0; i <= steps; i++) {
                                const z = x2_4 - 4 + (i/steps)*8;
                                const y2 = 4 * (x2_4 - z);
                                if (y2 >= 0) {
                                    const y = Math.sqrt(y2);
                                    points.push(new THREE.Vector3(x, y, z));
                                    if (y > 0.01) points.push(new THREE.Vector3(x, -y, z));
                                }
                            }
                        }
                        break;
                        
                    case 'cone':
                        if (planeType === 'xy') {
                            const z = sliceVal;
                            const rx = 2 * Math.abs(z);
                            const ry = 3 * Math.abs(z);
                            for (let i = 0; i <= steps; i++) {
                                const t = (i / steps) * Math.PI * 2;
                                points.push(new THREE.Vector3(rx * Math.cos(t), ry * Math.sin(t), z));
                            }
                        } else if (planeType === 'xz') {
                            const y = sliceVal;
                            for (let i = 0; i <= steps; i++) {
                                const x = -3 + (i/steps)*6;
                                const z = Math.sqrt(x*x/4 + y*y/9);
                                if (!isNaN(z)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    points.push(new THREE.Vector3(x, y, -z));
                                }
                            }
                        } else {
                            const x = sliceVal;
                            for (let i = 0; i <= steps; i++) {
                                const y = -3 + (i/steps)*6;
                                const z = Math.sqrt(x*x/4 + y*y/9);
                                if (!isNaN(z)) {
                                    points.push(new THREE.Vector3(x, y, z));
                                    points.push(new THREE.Vector3(x, y, -z));
                                }
                            }
                        }
                        break;
                }
            } catch (e) {
                return [];
            }
            
            return points.filter(p => !isNaN(p.x) && !isNaN(p.y) && !isNaN(p.z));
        }

        // --- 核心更新函数 ---
        function updateVisuals() {
            const surfaceType = document.getElementById('surface-select').value;
            const planeType = document.getElementById('plane-select').value;
            const sliceVal = parseFloat(document.getElementById('slice-value').value);
            const baseColor = document.getElementById('color-picker').value;
            const density = parseInt(document.getElementById('grid-density').value);
            const displayMode = document.getElementById('display-mode').value;
            
            // 清除旧内容
            while(surfaceGroup.children.length) surfaceGroup.remove(surfaceGroup.children[0]);
            while(planeGroup.children.length) planeGroup.remove(planeGroup.children[0]);
            while(intersectionGroup.children.length) intersectionGroup.remove(intersectionGroup.children[0]);
            
            const color = new THREE.Color(baseColor);
            
            // --- 生成曲面 ---
            const { vertices, indices } = generateSurfaceVertices(surfaceType, density);
            
            if (displayMode !== 'wire-only' && vertices.length > 0 && indices.length > 0) {
                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geom.setIndex(indices);
                geom.computeVertexNormals();
                
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7,
                    emissive: 0x000000,
                    shininess: 30
                });
                const mesh = new THREE.Mesh(geom, mat);
                surfaceGroup.add(mesh);
            }
            
            if (displayMode !== 'face-only' && vertices.length > 0 && indices.length > 0) {
                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geom.setIndex(indices);
                const edges = new THREE.EdgesGeometry(geom);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color.clone().multiplyScalar(1.5) }));
                surfaceGroup.add(line);
            }
            
            // --- 绘制截平面 ---
            let planePos;
            const planeSize = 10;
            if (planeType === 'xy') {
                planePos = new THREE.Vector3(0, 0, sliceVal);
            } else if (planeType === 'xz') {
                planePos = new THREE.Vector3(0, sliceVal, 0);
            } else {
                planePos = new THREE.Vector3(sliceVal, 0, 0);
            }
            
            const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
            const planeMat = new THREE.MeshPhongMaterial({
                color: 0x88aaff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.15,
                emissive: 0x112233
            });
            const planeMesh = new THREE.Mesh(planeGeo, planeMat);
            if (planeType === 'xz') planeMesh.rotation.x = Math.PI/2;
            if (planeType === 'yz') planeMesh.rotation.y = Math.PI/2;
            planeMesh.position.copy(planePos);
            planeGroup.add(planeMesh);
            
            // 边框
            const borderGeo = new THREE.EdgesGeometry(planeGeo);
            const borderMat = new THREE.LineBasicMaterial({ color: 0xaaccff });
            const border = new THREE.LineSegments(borderGeo, borderMat);
            border.position.copy(planePos);
            border.rotation.copy(planeMesh.rotation);
            planeGroup.add(border);
            
            // --- 生成截痕线 ---
            const points = computeIntersectionPoints(surfaceType, planeType, sliceVal);
            if (points.length > 1) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xff3366, linewidth: 2 }));
                intersectionGroup.add(line);
                
                const sphereMat = new THREE.PointsMaterial({ color: 0xff0000, size: 0.12 });
                const sphereGeo = new THREE.BufferGeometry();
                const verts = points.flatMap(p => [p.x, p.y, p.z]);
                sphereGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
                intersectionGroup.add(new THREE.Points(sphereGeo, sphereMat));
            }
            
            // 更新显示
            document.getElementById('slice-display').innerText = sliceVal.toFixed(2);
            document.getElementById('density-display').innerText = density;
        }

        // --- 事件绑定 ---
        document.getElementById('surface-select').addEventListener('change', updateVisuals);
        document.getElementById('plane-select').addEventListener('change', updateVisuals);
        document.getElementById('slice-value').addEventListener('input', (e) => {
            document.getElementById('slice-display').innerText = parseFloat(e.target.value).toFixed(2);
            updateVisuals();
        });
        document.getElementById('color-picker').addEventListener('input', updateVisuals);
        document.getElementById('grid-density').addEventListener('input', (e) => {
            document.getElementById('density-display').innerText = e.target.value;
            updateVisuals();
        });
        document.getElementById('display-mode').addEventListener('change', updateVisuals);

        // 初始调用
        updateVisuals();

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // --- 窗口自适应 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
