<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>点电荷电势场 · E = -∇V 关系可视化</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background-color: #020408;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 0 0 20px rgba(0,160,255,0.8);
            padding: 0 16px;
            box-sizing: border-box;
        }
        h1 {
            font-weight: 500;
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            letter-spacing: 6px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #80d0ff, #b090ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            font-size: 0.9rem;
            opacity: 0.95;
            letter-spacing: 3px;
            color: #8ecae6;
            border-bottom: 1px solid #4a9aca;
            padding-bottom: 6px;
            backdrop-filter: blur(5px);
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #c0e0ff;
            font-size: 0.85rem;
            background: rgba(5, 18, 35, 0.8);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid #3a8ab0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-box {
            width: 20px;
            height: 12px;
            border-radius: 6px;
            background: rgba(0,200,255,0.6);
            box-shadow: 0 0 15px #0af;
            border: 1px solid #8ed0ff;
        }
        .particle-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffaa00;
            box-shadow: 0 0 20px #ff9900;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #8ab4f8;
            font-size: 0.8rem;
            background: rgba(10, 25, 40, 0.7);
            padding: 8px 18px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid #2c6a8c;
            pointer-events: none;
            z-index: 10;
        }
        #relation-badge {
            position: absolute;
            top: 90px;
            left: 20px;
            color: #ffdd99;
            font-size: 1rem;
            font-weight: bold;
            background: rgba(20, 40, 70, 0.8);
            padding: 10px 22px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa33;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 30px rgba(255,170,0,0.3);
            text-shadow: 0 0 15px #fa0;
        }
        @media (max-width: 600px) {
            #legend { font-size: 0.7rem; padding: 8px 12px; gap: 12px; }
            #controls-hint { font-size: 0.65rem; }
            #relation-badge { font-size: 0.85rem; padding: 6px 16px; top: 80px; }
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>⚡ 点电荷电势场</h1>
        <div class="sub">等势面 · 电场梯度 · E = -∇V</div>
    </div>
    
    <!-- 核心关系标识牌 -->
    <div id="relation-badge">
        ⚡ E = -∇V &nbsp;&nbsp; | &nbsp;&nbsp; 电场方向 = 电势降方向
    </div>

    <div id="legend">
        <div class="legend-item"><span class="color-box"></span> 等势面 (V恒定)</div>
        <div class="legend-item"><span style="color:#88ccff; font-size:1.2em;">⬆️</span> 电场线 (E方向)</div>
        <div class="legend-item"><span class="particle-dot"></span> 正电荷 (沿E运动)</div>
        <div class="legend-item"><span style="background:#3388ff; width:16px;height:16px;border-radius:50%;display:inline-block; margin-right:6px;"></span> 点电荷 +Q</div>
    </div>
    <div id="controls-hint">👆 单指旋转 · 双指平移/缩放 · 自动旋转</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#030a14');
        
        // 星空背景
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 2500;
        const starPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i+=3) {
            const r = 70 + Math.random() * 130;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random()*2)-1);
            starPos[i] = Math.sin(phi)*Math.cos(theta)*r;
            starPos[i+1] = Math.sin(phi)*Math.sin(theta)*r;
            starPos[i+2] = Math.cos(phi)*r;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.18, transparent: true});
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- 相机 ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 7, 16);
        camera.lookAt(0, 0, 0);

        // --- 渲染器 ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // CSS2渲染器
        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0px';
        cssRenderer.domElement.style.left = '0px';
        cssRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(cssRenderer.domElement);

        // --- 轨道控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.7;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.maxPolarAngle = Math.PI / 1.7;
        controls.minDistance = 5;
        controls.maxDistance = 28;
        controls.target.set(0, 0, 0);

        // --- 光照系统 ---
        scene.add(new THREE.AmbientLight(0x404080, 0.45));
        
        const lightFront = new THREE.PointLight(0x9ac0ff, 1.3);
        lightFront.position.set(8, 12, 10);
        scene.add(lightFront);
        
        const lightBack = new THREE.PointLight(0x5f9fff, 0.9);
        lightBack.position.set(-10, 6, -12);
        scene.add(lightBack);
        
        const lightSide = new THREE.PointLight(0xaa99ff, 0.7);
        lightSide.position.set(5, -4, 18);
        scene.add(lightSide);
        
        const lightFill = new THREE.PointLight(0x88aaff, 0.5);
        lightFill.position.set(-6, 10, -8);
        scene.add(lightFill);
        
        // 辅助网格
        const gridHelper = new THREE.GridHelper(22, 24, 0x3388cc, 0x1a4466);
        gridHelper.position.y = -2.4;
        scene.add(gridHelper);
        
        // 坐标轴
        const axesHelper = new THREE.AxesHelper(9);
        scene.add(axesHelper);

        // --- 点电荷 (中心) ---
        const chargeGroup = new THREE.Group();
        
        const coreMat = new THREE.MeshStandardMaterial({ 
            color: 0x3388ff, 
            emissive: new THREE.Color(0x1166cc), 
            roughness: 0.15, 
            metalness: 0.1 
        });
        const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(0.7, 48, 24), coreMat);
        chargeGroup.add(coreSphere);
        
        // 内光晕
        const glowGeo = new THREE.BufferGeometry();
        const gpPos = [];
        for (let i = 0; i < 180; i++) {
            const theta = (i / 180) * Math.PI * 2;
            const phi = Math.sin(i * 0.9) * 0.4;
            const r = 0.95;
            gpPos.push(r * Math.sin(theta) * Math.cos(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(theta));
        }
        glowGeo.setAttribute('position', new THREE.Float32BufferAttribute(gpPos, 3));
        const glowMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.035, blending: THREE.AdditiveBlending });
        const glowParticles = new THREE.Points(glowGeo, glowMat);
        chargeGroup.add(glowParticles);
        
        scene.add(chargeGroup);

        // 点电荷标签
        const chargeLabelDiv = document.createElement('div');
        chargeLabelDiv.textContent = '⚡ +Q';
        chargeLabelDiv.style.color = '#b0daff';
        chargeLabelDiv.style.fontSize = '20px';
        chargeLabelDiv.style.fontWeight = 'bold';
        chargeLabelDiv.style.textShadow = '0 0 25px #0af';
        chargeLabelDiv.style.background = 'rgba(15,40,70,0.7)';
        chargeLabelDiv.style.padding = '4px 18px';
        chargeLabelDiv.style.borderRadius = '30px';
        chargeLabelDiv.style.backdropFilter = 'blur(6px)';
        chargeLabelDiv.style.border = '1px solid #4aa0df';
        chargeLabelDiv.style.pointerEvents = 'none';
        const chargeLabel = new CSS2DObject(chargeLabelDiv);
        chargeLabel.position.set(0, 1.6, 0);
        scene.add(chargeLabel);

        // --- 等势面 (清晰分层) ---
        const equipGroup = new THREE.Group();
        
        const radii = [1.9, 2.9, 4.0, 5.2, 6.5];
        const colors = [0x3399ff, 0x55bbff, 0x77ddff, 0x99eeff, 0xbbffff];
        const opacities = [0.32, 0.26, 0.20, 0.15, 0.10];
        const edgeColors = [0x88ccff, 0xaaddff, 0xccffff, 0xeeffff, 0xffffff];
        
        radii.forEach((r, idx) => {
            const geom = new THREE.SphereGeometry(r, 64, 32);
            const mat = new THREE.MeshPhongMaterial({
                color: colors[idx],
                transparent: true,
                opacity: opacities[idx],
                side: THREE.DoubleSide,
                emissive: new THREE.Color(0x112844),
                shininess: 30
            });
            const sphere = new THREE.Mesh(geom, mat);
            equipGroup.add(sphere);
            
            const edgeMat = new THREE.MeshBasicMaterial({ 
                color: edgeColors[idx], 
                wireframe: true, 
                transparent: true, 
                opacity: 0.22 + idx * 0.02 
            });
            const wireSphere = new THREE.Mesh(geom, edgeMat);
            equipGroup.add(wireSphere);
        });
        
        scene.add(equipGroup);

        // 等势面标签
        const labelData = [
            { r: 1.9, text: 'V₁ (高电势)', pos: [1.9, 0.8, 0.6] },
            { r: 2.9, text: 'V₂', pos: [0.5, 2.0, 2.0] },
            { r: 4.0, text: 'V₃', pos: [-2.8, 1.5, 1.8] },
            { r: 5.2, text: 'V₄', pos: [2.5, -1.8, 3.0] },
            { r: 6.5, text: 'V₅ (低电势)', pos: [-1.5, -2.5, 4.0] }
        ];
        labelData.forEach((item) => {
            const div = document.createElement('div');
            div.textContent = item.text;
            div.style.color = '#c0e8ff';
            div.style.fontSize = '15px';
            div.style.fontWeight = '600';
            div.style.textShadow = '0 0 18px #0af';
            div.style.background = 'rgba(8,30,55,0.7)';
            div.style.padding = '4px 14px';
            div.style.borderRadius = '24px';
            div.style.backdropFilter = 'blur(5px)';
            div.style.border = '1.5px solid #5ab0e0';
            div.style.pointerEvents = 'none';
            
            const label = new CSS2DObject(div);
            label.position.set(item.pos[0], item.pos[1], item.pos[2]);
            scene.add(label);
        });

        // --- 电场线 (梯度方向，带箭头) ---
        const fieldLineGroup = new THREE.Group();
        const lineMat = new THREE.LineBasicMaterial({ color: 0x88ccff });
        const directions = [];
        
        for (let i = 0; i < 36; i++) {
            const theta = (i / 36) * Math.PI * 2;
            for (let j = 1; j < 5; j++) {
                const phi = Math.acos((j / 5) * 2 - 1);
                directions.push(new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta),
                    Math.sin(phi) * Math.sin(theta),
                    Math.cos(phi)
                ).normalize());
            }
        }
        
        const uniqueDirs = [];
        directions.forEach(d => { if (!uniqueDirs.some(u => u.distanceTo(d) < 0.3)) uniqueDirs.push(d); });
        
        uniqueDirs.forEach(dir => {
            const points = [];
            for (let r = 0.8; r <= 7.2; r += 0.25) {
                points.push(dir.clone().multiplyScalar(r));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geom, lineMat);
            fieldLineGroup.add(line);
        });
        
        // 添加箭头 (标明E方向)
        const arrowColor = 0x88ddff;
        uniqueDirs.slice(0, 16).forEach(dir => {
            const pos = dir.clone().multiplyScalar(3.0);
            const arrowHelper = new THREE.ArrowHelper(dir, pos, 0.9, arrowColor, 0.25, 0.18);
            fieldLineGroup.add(arrowHelper);
            
            const pos2 = dir.clone().multiplyScalar(5.5);
            const arrowHelper2 = new THREE.ArrowHelper(dir, pos2, 0.8, arrowColor, 0.22, 0.16);
            fieldLineGroup.add(arrowHelper2);
        });
        
        scene.add(fieldLineGroup);

        // 添加梯度关系标注 (CSS2D)
        const gradLabelDiv = document.createElement('div');
        gradLabelDiv.textContent = '∇V 方向 (指向中心)';
        gradLabelDiv.style.color = '#ffbb77';
        gradLabelDiv.style.fontSize = '14px';
        gradLabelDiv.style.fontWeight = 'bold';
        gradLabelDiv.style.textShadow = '0 0 15px #fa0';
        gradLabelDiv.style.background = 'rgba(40,30,20,0.7)';
        gradLabelDiv.style.padding = '4px 16px';
        gradLabelDiv.style.borderRadius = '20px';
        gradLabelDiv.style.backdropFilter = 'blur(5px)';
        gradLabelDiv.style.border = '1.5px solid #ffaa33';
        gradLabelDiv.style.pointerEvents = 'none';
        const gradLabel = new CSS2DObject(gradLabelDiv);
        gradLabel.position.set(-2.5, 3.5, 2.5);
        scene.add(gradLabel);
        
        const eLabelDiv = document.createElement('div');
        eLabelDiv.textContent = 'E 方向 (背离中心)';
        eLabelDiv.style.color = '#88ccff';
        eLabelDiv.style.fontSize = '14px';
        eLabelDiv.style.fontWeight = 'bold';
        eLabelDiv.style.textShadow = '0 0 15px #0af';
        eLabelDiv.style.background = 'rgba(20,40,70,0.7)';
        eLabelDiv.style.padding = '4px 16px';
        eLabelDiv.style.borderRadius = '20px';
        eLabelDiv.style.backdropFilter = 'blur(5px)';
        eLabelDiv.style.border = '1.5px solid #4aa0df';
        eLabelDiv.style.pointerEvents = 'none';
        const eLabel = new CSS2DObject(eLabelDiv);
        eLabel.position.set(4.0, 2.0, 3.5);
        scene.add(eLabel);

        // --- 带电粒子系统 ---
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        
        const velocities = [];
        const colorStart = new THREE.Color(0xff8800);
        const colorEnd = new THREE.Color(0xffdd00);
        
        for (let i = 0; i < particleCount; i++) {
            const r = 2.5 + Math.random() * 5.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = z;
            
            const mix = (r - 2.0) / 6.0;
            const col = colorStart.clone().lerp(colorEnd, mix);
            particleColors[i*3] = col.r;
            particleColors[i*3+1] = col.g;
            particleColors[i*3+2] = col.b;
            
            const dir = new THREE.Vector3(x, y, z).normalize();
            velocities.push({
                x: dir.x * 0.8 + (Math.random()-0.5)*0.3,
                y: dir.y * 0.8 + (Math.random()-0.5)*0.3,
                z: dir.z * 0.8 + (Math.random()-0.5)*0.3
            });
        }
        
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        
        const particleMat = new THREE.PointsMaterial({
            size: 0.14,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // 粒子尾迹
        const trailGroup = new THREE.Group();
        const trailCount = 120;
        const trailLines = [];
        const trailPositions = [];
        
        for (let i = 0; i < trailCount; i++) {
            const r = 2.8 + Math.random() * 4.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const pos = new THREE.Vector3(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
            trailPositions.push({ pos: pos.clone(), vel: pos.clone().normalize().multiplyScalar(0.5) });
            
            const geom = new THREE.BufferGeometry();
            const points = [pos.clone(), pos.clone().addScaledVector(pos.clone().normalize(), 0.6)];
            geom.setFromPoints(points);
            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.45 }));
            trailGroup.add(line);
            trailLines.push(line);
        }
        scene.add(trailGroup);

        // --- 动态更新 ---
        const clock = new THREE.Clock();
        
        function updateParticles(deltaTime) {
            const positions = particles.geometry.attributes.position.array;
            const colorsArr = particles.geometry.attributes.color.array;
            
            const dt = Math.min(deltaTime * 0.9, 0.025);
            const fieldStrength = 5.5;
            
            for (let i = 0; i < particleCount; i++) {
                let px = positions[i*3];
                let py = positions[i*3+1];
                let pz = positions[i*3+2];
                
                const r = Math.sqrt(px*px + py*py + pz*pz);
                
                if (r < 1.2 || r > 8.2) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random()*2)-1);
                    const newR = 2.8 + Math.random() * 3.5;
                    px = newR * Math.sin(phi) * Math.cos(theta);
                    py = newR * Math.sin(phi) * Math.sin(theta);
                    pz = newR * Math.cos(phi);
                    positions[i*3] = px;
                    positions[i*3+1] = py;
                    positions[i*3+2] = pz;
                    
                    const dir = new THREE.Vector3(px, py, pz).normalize();
                    velocities[i] = {
                        x: dir.x * 0.6 + (Math.random()-0.5)*0.4,
                        y: dir.y * 0.6 + (Math.random()-0.5)*0.4,
                        z: dir.z * 0.6 + (Math.random()-0.5)*0.4
                    };
                    continue;
                }
                
                const invR = 1 / r;
                const Ex = px * invR;
                const Ey = py * invR;
                const Ez = pz * invR;
                
                const E_mag = fieldStrength / (r * r + 0.3);
                
                const ax = Ex * E_mag;
                const ay = Ey * E_mag;
                const az = Ez * E_mag;
                
                velocities[i].x += ax * dt + (Math.random() - 0.5) * 0.018;
                velocities[i].y += ay * dt + (Math.random() - 0.5) * 0.018;
                velocities[i].z += az * dt + (Math.random() - 0.5) * 0.018;
                
                const speed = Math.sqrt(velocities[i].x**2 + velocities[i].y**2 + velocities[i].z**2);
                if (speed > 2.2) {
                    velocities[i].x *= 2.0 / speed;
                    velocities[i].y *= 2.0 / speed;
                    velocities[i].z *= 2.0 / speed;
                }
                
                px += velocities[i].x * dt;
                py += velocities[i].y * dt;
                pz += velocities[i].z * dt;
                
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
                
                const newR = Math.sqrt(px*px + py*py + pz*pz);
                const mix = Math.max(0, Math.min(1, (newR - 1.8) / 6.5));
                const col = colorStart.clone().lerp(colorEnd, mix);
                colorsArr[i*3] = col.r;
                colorsArr[i*3+1] = col.g;
                colorsArr[i*3+2] = col.b;
            }
            
            particleGeo.attributes.position.needsUpdate = true;
            particleGeo.attributes.color.needsUpdate = true;
        }
        
        function updateTrails(deltaTime) {
            const dt = deltaTime * 0.8;
            trailPositions.forEach((item, idx) => {
                let pos = item.pos;
                const r = pos.length();
                
                if (r > 7.8 || r < 1.5) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random()*2)-1);
                    const newR = 3.0 + Math.random() * 3.5;
                    pos.set(
                        newR * Math.sin(phi) * Math.cos(theta),
                        newR * Math.sin(phi) * Math.sin(theta),
                        newR * Math.cos(phi)
                    );
                    item.vel = pos.clone().normalize().multiplyScalar(0.5);
                }
                
                const dir = pos.clone().normalize();
                const E_mag = 5.0 / (r * r + 0.4);
                const move = dir.multiplyScalar(E_mag * dt * 1.3);
                const oldPos = pos.clone();
                pos.add(move);
                
                const points = [oldPos, pos.clone()];
                trailLines[idx].geometry.dispose();
                trailLines[idx].geometry = new THREE.BufferGeometry().setFromPoints(points);
            });
        }

        function animate() {
            const deltaTime = clock.getDelta();
            const elapsedTime = performance.now() * 0.001;
            
            updateParticles(deltaTime);
            updateTrails(deltaTime);
            
            controls.update();
            
            equipGroup.children.forEach((child, i) => {
                if (child.isMesh && child.material.transparent) {
                    const baseOp = [0.32, 0.26, 0.20, 0.15, 0.10][Math.floor(i/2)];
                    child.material.opacity = baseOp + 0.04 * Math.sin(elapsedTime * 1.2 + i);
                }
            });
            
            glowParticles.rotation.y += 0.008;
            glowParticles.rotation.x += 0.003;
            stars.rotation.y += 0.0003;
            
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
