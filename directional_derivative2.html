<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>方向导数的直观理解 · 双视图无闪烁</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background-color: #0a0f18;
            touch-action: pan-y pinch-zoom;
        }
        /* 主标题 - 顶端居中醒目 */
        #main-title {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 4px 15px #00000080, 0 0 20px #3a7ca5;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, transparent, #ffbb3350, transparent);
            padding: 14px 0;
            margin: 0;
            backdrop-filter: blur(2px);
            font-family: inherit;
        }
        @media (max-width: 600px) {
            #main-title { font-size: 22px; padding: 10px 0; top: 0; }
        }
        /* 双视图独立容器：3D视图 + 2D曲线图，彻底避免相互遮挡 */
        .view-container {
            position: absolute;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(74, 108, 138, 0.6);
            transition: all 0.2s ease;
            background: rgba(10, 15, 24, 0.3);
        }
        #view3d {
            top: 70px;
            left: 20px;
            right: 380px;
            bottom: 20px;
            z-index: 10;
        }
        #view2d {
            top: 70px;
            right: 20px;
            width: 340px;
            bottom: 20px;
            z-index: 20;
            background: rgba(18, 28, 40, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 曲线图内部画布容器 */
        .canvas-header {
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #ffdd99;
            border-bottom: 1px solid #3a6a8a;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .canvas-header span:first-child {
            background: #1e2e3f;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #bbddff;
        }
        .canvas-header button {
            background: #2a3f55;
            border: none;
            color: #ffdd99;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.1s;
        }
        .canvas-header button:active { background: #ffaa33; color: #111; }
        #derivativeCanvas {
            display: block;
            width: 100%;
            flex: 1;
            cursor: grab;
            background: #0b111c;
            touch-action: none;
        }
        /* 控制面板在3D视图内浮动，依然位于左上角不遮挡曲线 */
        .control-panel {
            position: absolute;
            top: 85px;
            left: 28px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .control-card {
            background: rgba(8, 18, 28, 0.92);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            padding: 12px 18px;
            border: 1px solid #5a7e9e;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            pointer-events: auto;
            color: white;
            transition: 0.1s;
        }
        .func-btn {
            background: #1e2e3f;
            border: 1px solid #3a7ca5;
            color: #ccdfff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 6px;
            margin-bottom: 5px;
        }
        .func-btn.active {
            background: #ffaa00;
            color: #111;
            border-color: #ffdd88;
            box-shadow: 0 0 12px #ffaa00aa;
        }
        #angle-slider {
            width: 170px;
            vertical-align: middle;
        }
        #angle-value {
            min-width: 65px;
            background: #1e2e3f;
            padding: 4px 10px;
            border-radius: 30px;
            text-align: center;
            font-family: monospace;
            border: 1px solid #ffaa00;
            color: #ffdd99;
            display: inline-block;
        }
        .info-line {
            font-size: 0.8rem;
            margin-top: 8px;
            color: #bbddff;
        }
        .grad-line {
            font-size: 0.8rem;
            background: #0f1a24aa;
            border-radius: 18px;
            padding: 4px 8px;
            margin-top: 6px;
        }
        @media (max-width: 780px) {
            #view2d { width: 280px; top: 65px; right: 15px; bottom: 15px; }
            #view3d { left: 15px; right: 310px; bottom: 15px; top: 65px; }
            .control-panel { top: 75px; left: 15px; }
            .control-card { padding: 8px 12px; }
            .func-btn { padding: 4px 10px; font-size: 12px; }
            #angle-slider { width: 130px; }
        }
        @media (max-width: 650px) {
            #view2d { width: 240px; }
            #view3d { right: 270px; }
        }
        /* 彻底消除闪烁：强制GPU加速，防止重绘冲突 */
        canvas, .css2d-object, .three-canvas {
            will-change: transform;
            backface-visibility: hidden;
            transform: translateZ(0);
        }
        .grad-footer {
            position: absolute;
            bottom: 18px;
            left: 28px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #aaccff;
            z-index: 35;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="main-title">🧭 方向导数的直观理解</div>

    <div class="view-container" id="view3d"></div>
    <div class="view-container" id="view2d">
        <div class="canvas-header">
            <span>📈 方向导数曲线 ∂f/∂l</span>
            <button id="resetCurveView" title="重置缩放/平移">⟳ 重置视图</button>
        </div>
        <canvas id="derivativeCanvas" width="600" height="500"></canvas>
    </div>
    
    <div class="control-panel">
        <div class="control-card">
            <div style="display: flex; gap: 6px; flex-wrap: wrap;" id="function-selector">
                <button class="func-btn active" data-func="0">🍃 f₁ = x·e^{-x²-y²}</button>
                <button class="func-btn" data-func="1">🌊 f₂ = sin(x)·cos(y)</button>
                <button class="func-btn" data-func="2">⚡ f₃ = (x²-y²)/3</button>
            </div>
        </div>
        <div class="control-card">
            <div style="font-weight: 500;">📍 采样点 P (<span id="px-val">0.60</span>, <span id="py-val">-0.30</span>)</div>
            <div style="display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
                <span style="color:#ffbb33;">🧭 方向角 θ</span>
                <input type="range" id="angle-slider" min="0" max="360" value="45" step="0.5">
                <span id="angle-value">45.0°</span>
            </div>
            <div class="grad-line">
                🟢 ∇f 方向: <span id="grad-angle">--</span>° &nbsp; |∇f| = <span id="max-deriv">--</span>
            </div>
            <div class="info-line">
                💡 点击曲面 → 移动点P &nbsp;|&nbsp; 曲线图可拖拽/滚轮缩放
            </div>
        </div>
    </div>
    <div class="grad-footer">
        ⬆️ 绿色:梯度方向 &nbsp;|&nbsp; 🟡 橙色:方向l &nbsp;|&nbsp; 独立曲线窗口可拖拽/缩放
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ---------- 独立3D场景: 容器分离 + 防闪烁优化 ----------
        const container3d = document.getElementById('view3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0c1420);
        // 禁用雾效避免材质闪烁，使用固定背景
        scene.fog = null;
        
        // 相机适配容器尺寸
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(3.8, 2.9, 5.5);
        camera.lookAt(0, 0.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(container3d.clientWidth, container3d.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // 降低像素比提升稳定性，减少闪烁
        renderer.shadowMap.enabled = false;
        // 关键：禁用自动清除，手动控制 (但简单场景无需，但强制稳定)
        renderer.setClearColor(0x0c1420, 1);
        container3d.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(container3d.clientWidth, container3d.clientHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.left = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container3d.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.0;
        controls.target.set(0, 0.2, 0);
        
        // 光照系统 (柔和但稳定)
        scene.add(new THREE.AmbientLight(0x4a5a7a));
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.1);
        mainLight.position.set(1.8, 2.5, 1.2);
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0xccaa88, 0.6);
        fillLight.position.set(-1.5, 1.8, 2.2);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0x4488aa, 0.45);
        rimLight.position.set(0, 1.2, -2.8);
        scene.add(rimLight);
        
        // 辅助元素: 轻量坐标轴
        const axesHelper = new THREE.AxesHelper(3.5);
        scene.add(axesHelper);
        // 地面参考网格 (半透明, 增强空间感，减少视觉跳动)
        const gridHelper = new THREE.GridHelper(7, 24, 0x88aaff, 0x336699);
        gridHelper.position.y = -0.48;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // 星空背景粒子 (静态不刷新)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 280;
            starPos[i*3+1] = (Math.random() - 0.5) * 120;
            starPos[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ---------- 函数库 ----------
        const funcs = [
            { 
                f: (x,y) => x * Math.exp(-x*x - y*y),
                dfdx: (x,y) => Math.exp(-x*x - y*y) * (1 - 2*x*x),
                dfdy: (x,y) => -2 * x * y * Math.exp(-x*x - y*y),
                name: 'f₁', rangeZ: [-0.45, 0.55]
            },
            { 
                f: (x,y) => Math.sin(x) * Math.cos(y),
                dfdx: (x,y) => Math.cos(x) * Math.cos(y),
                dfdy: (x,y) => -Math.sin(x) * Math.sin(y),
                name: 'f₂', rangeZ: [-0.95, 0.95]
            },
            { 
                f: (x,y) => (x*x - y*y) / 3,
                dfdx: (x,y) => 2*x / 3,
                dfdy: (x,y) => -2*y / 3,
                name: 'f₃', rangeZ: [-1.2, 1.2]
            }
        ];
        let activeFunc = funcs[0];
        const size = 2.8;
        let surfaceMesh = null;
        let contourGroup = null;
        
        // 重建曲面 (使用非频繁重建，并且geometry复用优化)
        function rebuildSurfaceAndContours() {
            if (surfaceMesh) scene.remove(surfaceMesh);
            if (contourGroup) scene.remove(contourGroup);
            
            // 曲面几何体 (较高分辨率但性能良好)
            const w = 86, h = 86;
            const vertices = [];
            const indices = [];
            const colors = [];
            for (let i = 0; i <= w; i++) {
                const x = -size + (2 * size * i) / w;
                for (let j = 0; j <= h; j++) {
                    const y = -size + (2 * size * j) / h;
                    const z = activeFunc.f(x, y);
                    vertices.push(x, z, y);
                    // 动态着色基于z和位置，消除色带闪烁
                    const t = (z + 0.8) / 1.8;
                    const r = 0.3 + 0.6 * Math.sin(t * Math.PI);
                    const g = 0.4 + 0.5 * Math.cos(t * 1.3);
                    const b = 0.7 + 0.3 * (1 - t);
                    colors.push(r, g, b);
                }
            }
            for (let i = 0; i < w; i++) {
                for (let j = 0; j < h; j++) {
                    const a = i * (h+1) + j;
                    const b = a + 1;
                    const c = (i+1) * (h+1) + j;
                    const d = c + 1;
                    indices.push(a, b, c);
                    indices.push(b, d, c);
                }
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geom.setIndex(indices);
            geom.computeVertexNormals(); // 提高光照稳定性
            
            surfaceMesh = new THREE.Mesh(geom, new THREE.MeshPhongMaterial({
                vertexColors: true,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.94,
                shininess: 48,
                emissive: 0x111122,
                flatShading: false
            }));
            scene.add(surfaceMesh);
            
            // 等值线组 (清晰轮廓，减少线条数量避免闪烁)
            contourGroup = new THREE.Group();
            const levels = [-0.5, -0.3, -0.1, 0, 0.2, 0.4, 0.6];
            levels.forEach(lv => {
                const segments = [];
                const step = 0.065;
                const N = Math.floor(2 * size / step);
                for (let i = 0; i < N; i++) {
                    for (let j = 0; j < N; j++) {
                        const x0 = -size + i * step;
                        const y0 = -size + j * step;
                        const x1 = x0 + step;
                        const y1 = y0 + step;
                        const v00 = activeFunc.f(x0, y0) - lv;
                        const v10 = activeFunc.f(x1, y0) - lv;
                        const v01 = activeFunc.f(x0, y1) - lv;
                        const v11 = activeFunc.f(x1, y1) - lv;
                        const pts = [];
                        if (v00 * v10 < 0) pts.push([x0 + step * (0 - v00) / (v10 - v00), y0]);
                        if (v00 * v01 < 0) pts.push([x0, y0 + step * (0 - v00) / (v01 - v00)]);
                        if (v10 * v11 < 0) pts.push([x1, y0 + step * (0 - v10) / (v11 - v10)]);
                        if (v01 * v11 < 0) pts.push([x0 + step * (0 - v01) / (v11 - v01), y1]);
                        if (pts.length === 2) {
                            const p1 = pts[0], p2 = pts[1];
                            const z1 = activeFunc.f(p1[0], p1[1]) + 0.008;
                            const z2 = activeFunc.f(p2[0], p2[1]) + 0.008;
                            segments.push(p1[0], z1, p1[1], p2[0], z2, p2[1]);
                            // 底面投影线
                            segments.push(p1[0], -0.48, p1[1], p2[0], -0.48, p2[1]);
                        }
                    }
                }
                if (segments.length) {
                    const lineGeom = new THREE.BufferGeometry();
                    lineGeom.setAttribute('position', new THREE.Float32BufferAttribute(segments, 3));
                    const material = new THREE.LineBasicMaterial({ color: 0x88bbff, linewidth: 1 });
                    contourGroup.add(new THREE.LineSegments(lineGeom, material));
                }
            });
            scene.add(contourGroup);
        }
        
        rebuildSurfaceAndContours();
        
        // 3D 标记物: 点P, 方向箭头
        const sphereMarker = new THREE.Mesh(new THREE.SphereGeometry(0.085, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff7744, emissive: 0x441100, roughness: 0.3 }));
        scene.add(sphereMarker);
        
        const arrowL = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 0.72, 0xffaa44, 0.28, 0.18);
        const arrowGrad = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 0.72, 0x55ff88, 0.28, 0.18);
        const projL = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,-0.48,0), 0.7, 0xffaa44, 0.24, 0.15);
        const projGrad = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,-0.48,0), 0.7, 0x55ff88, 0.24, 0.15);
        scene.add(arrowL, arrowGrad, projL, projGrad);
        
        function makeCSS2D(text, bgColor, borderColor) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = '#fff';
            div.style.fontSize = '13px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0 black';
            div.style.background = bgColor || 'rgba(20,40,70,0.85)';
            div.style.padding = '2px 10px';
            div.style.borderRadius = '24px';
            div.style.border = `1.5px solid ${borderColor || '#ffaa66'}`;
            div.style.backdropFilter = 'blur(4px)';
            div.style.fontFamily = 'sans-serif';
            return new CSS2DObject(div);
        }
        const labelP = makeCSS2D('P', 'rgba(0,0,0,0.6)', '#ffaa66');
        const labelG = makeCSS2D('∇f', '#1e4a2eaa', '#77ff88');
        const labelL = makeCSS2D('l', '#5a3e1eaa', '#ffaa66');
        const labelGp = makeCSS2D('∇f', '#1e4a2eaa', '#77ff88');
        const labelLp = makeCSS2D('l', '#5a3e1eaa', '#ffaa66');
        scene.add(labelP, labelG, labelL, labelGp, labelLp);
        
        let currentPoint = { x: 0.6, y: -0.3 };
        let currentTheta = 45.0;
        
        // ----- 曲线图独立模块 (防闪烁，双缓冲，完整坐标轴标注) -----
        const canvas2d = document.getElementById('derivativeCanvas');
        const ctx = canvas2d.getContext('2d', { alpha: false });
        let isDraggingCurve = false;
        let dragStart = { x: 0, y: 0 };
        let viewOffset = { x: 0, y: 0 };
        let viewScale = 1.0;
        
        function resizeCanvas() {
            const container = document.getElementById('view2d');
            const headerH = 48;
            const availableHeight = container.clientHeight - headerH;
            if (availableHeight < 50) return;
            canvas2d.width = container.clientWidth;
            canvas2d.height = availableHeight;
            canvas2d.style.width = `${container.clientWidth}px`;
            canvas2d.style.height = `${availableHeight}px`;
            drawCurve();
        }
        
        function drawCurve() {
            const px = currentPoint.x, py = currentPoint.y;
            const gradX = activeFunc.dfdx(px, py);
            const gradY = activeFunc.dfdy(px, py);
            const gradNorm = Math.hypot(gradX, gradY);
            const gradAngleRad = Math.atan2(gradY, gradX);
            let gradAngleDeg = (gradAngleRad * 180 / Math.PI + 360) % 360;
            
            const w = canvas2d.width;
            const h = canvas2d.height;
            if (w === 0 || h === 0) return;
            
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.translate(viewOffset.x, viewOffset.y);
            ctx.scale(viewScale, viewScale);
            
            // 深邃背景
            ctx.fillStyle = '#0b111c';
            ctx.fillRect(0, 0, w, h);
            
            // 绘制网格 (浅色)
            ctx.strokeStyle = '#2a4560';
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= 5; i++) {
                const yPos = 55 + (i / 5) * (h - 110);
                ctx.beginPath();
                ctx.moveTo(75, yPos);
                ctx.lineTo(w - 30, yPos);
                ctx.stroke();
            }
            for (let ang = 0; ang <= 360; ang += 90) {
                const xPos = 75 + (ang / 360) * (w - 115);
                ctx.beginPath();
                ctx.moveTo(xPos, 35);
                ctx.lineTo(xPos, h-35);
                ctx.stroke();
            }
            
            // 坐标轴
            ctx.beginPath();
            ctx.strokeStyle = '#9abfdf';
            ctx.lineWidth = 2.2;
            ctx.moveTo(70, h - 45);
            ctx.lineTo(w - 20, h - 45);
            ctx.moveTo(75, 30);
            ctx.lineTo(75, h - 25);
            ctx.stroke();
            
            // 横轴文字：方向 l 对应的角度 θ
            ctx.fillStyle = '#ffddbb';
            ctx.font = '500 13px "Segoe UI", "Microsoft YaHei"';
            ctx.textAlign = 'center';
            for (let ang = 0; ang <= 360; ang += 60) {
                const x = 75 + (ang / 360) * (w - 115);
                ctx.fillText(ang + '°', x, h - 28);
            }
            ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei"';
            ctx.fillStyle = '#eef5ff';
            ctx.fillText('方向 l 对应的角度 θ →', w/2, h - 8);
            
            // 纵轴文字：方向导数符号 ∂f/∂l 或 数学符号
            ctx.save();
            ctx.translate(38, h/2);
            ctx.rotate(-Math.PI/2);
            ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei"';
            ctx.fillStyle = '#eef5ff';
            ctx.fillText('方向导数  ∂f/∂l   (点P处沿l的变化率)', 0, 0);
            ctx.restore();
            
            // 确定导数范围 (动态)
            let maxVal = 0;
            for (let d = 0; d <= 360; d += 8) {
                const rad = d * Math.PI/180;
                const val = gradX * Math.cos(rad) + gradY * Math.sin(rad);
                maxVal = Math.max(maxVal, Math.abs(val));
            }
            const limit = Math.max(0.25, Math.ceil(maxVal * 1.2 * 10) / 10);
            const minY = -limit;
            const maxY = limit;
            
            // 绘制纵轴刻度及数值
            ctx.fillStyle = '#cceeff';
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            for (let i = -2; i <= 2; i++) {
                const val = (i / 2) * limit;
                const yPos = h - 45 - ((val - minY) / (maxY - minY)) * (h - 85);
                if (yPos > 25 && yPos < h-20) {
                    ctx.fillText(val.toFixed(2), 68, yPos+3);
                    ctx.beginPath();
                    ctx.strokeStyle = '#3a6080';
                    ctx.moveTo(72, yPos);
                    ctx.lineTo(w-25, yPos);
                    ctx.stroke();
                }
            }
            
            // 绘制方向导数曲线
            ctx.beginPath();
            ctx.lineWidth = 3.2;
            ctx.strokeStyle = '#ffbb55';
            let first = true;
            for (let d = 0; d <= 360; d += 2) {
                const rad = d * Math.PI/180;
                const dirDeriv = gradX * Math.cos(rad) + gradY * Math.sin(rad);
                const x = 75 + (d / 360) * (w - 115);
                const y = h - 45 - ((dirDeriv - minY) / (maxY - minY)) * (h - 85);
                if (first) { ctx.moveTo(x, y); first = false; }
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // 当前方向标记 (红色)
            const curDeriv = gradX * Math.cos(currentTheta * Math.PI/180) + gradY * Math.sin(currentTheta * Math.PI/180);
            const cx = 75 + (currentTheta / 360) * (w - 115);
            const cy = h - 45 - ((curDeriv - minY) / (maxY - minY)) * (h - 85);
            ctx.beginPath();
            ctx.fillStyle = '#ff6666';
            ctx.arc(cx, cy, 8, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 梯度方向点 (绿色)
            const gradDeriv = gradNorm;
            const gx = 75 + (gradAngleDeg / 360) * (w - 115);
            const gy = h - 45 - ((gradDeriv - minY) / (maxY - minY)) * (h - 85);
            ctx.beginPath();
            ctx.fillStyle = '#66ff99';
            ctx.arc(gx, gy, 7, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
            
            // 图例说明
            ctx.font = 'bold 11px "Segoe UI"';
            ctx.fillStyle = '#ffbb77';
            ctx.fillText('● 当前方向 l', w-105, 40);
            ctx.fillStyle = '#77ff99';
            ctx.fillText('● 梯度方向 ∇f', w-105, 65);
            ctx.restore();
            
            // 更新显示
            document.getElementById('grad-angle').textContent = gradAngleDeg.toFixed(1);
            document.getElementById('max-deriv').textContent = gradNorm.toFixed(4);
            document.getElementById('px-val').textContent = currentPoint.x.toFixed(2);
            document.getElementById('py-val').textContent = currentPoint.y.toFixed(2);
            document.getElementById('angle-value').textContent = currentTheta.toFixed(1) + '°';
        }
        
        // 3D 场景全部更新
        function update3DAndCurve() {
            const px = currentPoint.x, py = currentPoint.y;
            const pz = activeFunc.f(px, py);
            sphereMarker.position.set(px, pz, py);
            labelP.position.set(px, pz + 0.22, py);
            
            const rad = currentTheta * Math.PI / 180;
            const dirVec = new THREE.Vector3(Math.cos(rad), 0, Math.sin(rad));
            const gradX = activeFunc.dfdx(px, py);
            const gradY = activeFunc.dfdy(px, py);
            const gradLen = Math.hypot(gradX, gradY);
            const gradDir = gradLen > 0.0001 ? new THREE.Vector3(gradX, 0, gradY).normalize() : new THREE.Vector3(1,0,0);
            
            const slope = gradX * dirVec.x + gradY * dirVec.z;
            arrowL.position.set(px, pz, py);
            arrowL.setDirection(new THREE.Vector3(dirVec.x, slope * 0.22, dirVec.z).normalize());
            labelL.position.set(px + dirVec.x * 0.9, pz + 0.32, py + dirVec.z * 0.9);
            
            arrowGrad.position.set(px, pz, py);
            arrowGrad.setDirection(new THREE.Vector3(gradDir.x, gradLen * 0.28, gradDir.z).normalize());
            labelG.position.set(px + gradDir.x * 0.95, pz + 0.32, py + gradDir.z * 0.95);
            
            projL.position.set(px, -0.48, py);
            projL.setDirection(dirVec);
            labelLp.position.set(px + dirVec.x * 0.85, -0.32, py + dirVec.z * 0.85);
            
            projGrad.position.set(px, -0.48, py);
            projGrad.setDirection(gradDir);
            labelGp.position.set(px + gradDir.x * 0.85, -0.32, py + gradDir.z * 0.85);
            
            drawCurve();
        }
        
        // 交互: 点击曲面拾取
        function onCanvasClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(surfaceMesh);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                currentPoint.x = Math.min(size-0.05, Math.max(-size+0.05, point.x));
                currentPoint.y = Math.min(size-0.05, Math.max(-size+0.05, point.z));
                update3DAndCurve();
            }
        }
        
        renderer.domElement.addEventListener('click', onCanvasClick);
        
        // 曲线图独立拖拽/缩放
        function initCurveEvents() {
            canvas2d.addEventListener('mousedown', (e) => {
                isDraggingCurve = true;
                dragStart.x = e.clientX - viewOffset.x;
                dragStart.y = e.clientY - viewOffset.y;
                canvas2d.style.cursor = 'grabbing';
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (isDraggingCurve) {
                    viewOffset.x = e.clientX - dragStart.x;
                    viewOffset.y = e.clientY - dragStart.y;
                    drawCurve();
                }
            });
            window.addEventListener('mouseup', () => {
                isDraggingCurve = false;
                canvas2d.style.cursor = 'grab';
            });
            canvas2d.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.92 : 1.08;
                viewScale = Math.min(3.0, Math.max(0.55, viewScale * delta));
                drawCurve();
            }, { passive: false });
            canvas2d.style.cursor = 'grab';
            document.getElementById('resetCurveView').addEventListener('click', () => {
                viewOffset = { x: 0, y: 0 };
                viewScale = 1.0;
                drawCurve();
            });
        }
        
        // 监听窗口/容器尺寸变化
        const resizeObserver = new ResizeObserver(() => {
            const w3d = container3d.clientWidth;
            const h3d = container3d.clientHeight;
            if (w3d && h3d) {
                camera.aspect = w3d / h3d;
                camera.updateProjectionMatrix();
                renderer.setSize(w3d, h3d);
                labelRenderer.setSize(w3d, h3d);
            }
            resizeCanvas();
        });
        resizeObserver.observe(container3d);
        resizeObserver.observe(document.getElementById('view2d'));
        
        // 功能按钮与滑块
        document.getElementById('angle-slider').addEventListener('input', (e) => {
            currentTheta = parseFloat(e.target.value);
            update3DAndCurve();
        });
        document.querySelectorAll('.func-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.func-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFunc = funcs[parseInt(btn.dataset.func)];
                rebuildSurfaceAndContours();
                update3DAndCurve();
            });
        });
        
        initCurveEvents();
        resizeCanvas();
        update3DAndCurve();
        
        // 动画循环 (使用requestAnimationFrame，无闪烁)
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // 手机触摸优化: 防止canvas触摸穿透
        canvas2d.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: false });
    </script>
</body>
</html>
