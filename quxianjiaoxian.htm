<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高等数学：空间解析几何 - 触摸隐藏UI版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            touch-action: none; /* 防止页面滚动 */
        }
        
        /* 所有UI元素的基础样式 */
        .ui-element {
            transition: opacity 0.3s ease;
            opacity: 1;
            pointer-events: auto;
        }
        
        .ui-element.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            border-radius: 60px;
            border: 1px solid #ffaa40;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease;
        }
        
        .scene-btn {
            background: transparent;
            color: white;
            border: 2px solid #556688;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            min-width: 150px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        .scene-btn.active {
            background: #ffaa00;
            color: #1a1a2e;
            border-color: #ffaa00;
            box-shadow: 0 0 25px #ffaa00;
        }
        
        #color-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #ffaa40;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 200px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            transition: opacity 0.3s ease;
        }
        
        .color-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .color-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 24px;
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        .color-picker {
            width: 70px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }
        
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border-radius: 8px; border: 2px solid #aaa; }

        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 35px;
            border-radius: 60px;
            font-size: 18px;
            border: 2px solid #ffaa40;
            z-index: 25;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            transition: opacity 0.3s ease;
        }
        
        #info-panel span {
            color: #ffaa00;
            font-weight: bold;
            font-size: 20px;
        }
        
        #instruction {
            position: absolute;
            bottom: 100px;
            right: 25px;
            background: rgba(30,30,40,0.8);
            color: #ddd;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa4066;
            z-index: 25;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        /* 触摸提示 */
        #touch-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 15px 30px;
            border-radius: 60px;
            font-size: 16px;
            border: 2px solid #ffaa00;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s ease;
            text-align: center;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 800px) {
            #ui-container { left: 10px; right: 10px; border-radius: 40px; justify-content: center; padding: 12px; }
            .scene-btn { padding: 8px 16px; font-size: 14px; min-width: 100px; }
            #color-controls { top: 100px; right: 10px; padding: 12px; min-width: 150px; }
            #info-panel { font-size: 14px; padding: 8px 20px; white-space: normal; width: 90%; text-align: center; }
            #info-panel span { font-size: 16px; }
            #instruction { bottom: 80px; font-size: 12px; }
            #touch-hint { font-size: 14px; padding: 12px 20px; white-space: normal; width: 80%; }
        }
    </style>
</head>
<body>
    <div id="touch-hint" class="ui-element">👆 点击屏幕显示控制面板</div>
    
    <div id="ui-container" class="ui-element">
        <button class="scene-btn active" data-scene="0">🔷 柱面 & 平面</button>
        <button class="scene-btn" data-scene="1">🟢 柱面 & 球面</button>
        <button class="scene-btn" data-scene="2">🟠 球面A & 球面B</button>
    </div>

    <div id="color-controls" class="ui-element">
        <div class="color-item">
            <div class="color-label">
                <span class="color-dot" style="background: #3a6eff;"></span>
                <span>曲面1颜色</span>
            </div>
            <input type="color" id="color1" value="#3a6eff" class="color-picker">
        </div>
        <div class="color-item">
            <div class="color-label">
                <span class="color-dot" style="background: #ff5533;"></span>
                <span>曲面2颜色</span>
            </div>
            <input type="color" id="color2" value="#ff5533" class="color-picker">
        </div>
    </div>

    <div id="info-panel" class="ui-element">当前：<span>柱面与平面交线</span> (平面方程 x+y+z=1)</div>
    <div id="instruction" class="ui-element">👆 触摸时隐藏界面 | 双击重置视角</div>

    <!-- 引入Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a18);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 6, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.enablePan = true;
        controls.maxDistance = 35;
        controls.minDistance = 6;
        controls.target.set(0, 0, 0);

        renderer.domElement.addEventListener('dblclick', () => {
            camera.position.set(12, 6, 15);
            controls.target.set(0, 0, 0);
        });

        // 灯光
        const ambient = new THREE.AmbientLight(0x404068);
        scene.add(ambient);
        const light1 = new THREE.DirectionalLight(0xffffff, 1.3);
        light1.position.set(4, 6, 5);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffeedd, 1.0);
        light2.position.set(-5, 4, 6);
        scene.add(light2);
        const pointLight = new THREE.PointLight(0x88aaff, 0.7, 30);
        pointLight.position.set(3, 5, 4);
        scene.add(pointLight);

        // 辅助元素
        const axes = new THREE.AxesHelper(7);
        scene.add(axes);
        const grid = new THREE.GridHelper(20, 30, 0x88aaff, 0x335588);
        grid.position.y = -2.5;
        scene.add(grid);
        
        // 星星背景
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            starsPos[i*3] = (Math.random() - 0.5) * 300;
            starsPos[i*3+1] = (Math.random() - 0.5) * 300;
            starsPos[i*3+2] = (Math.random() - 0.5) * 300;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.25, transparent: true });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // 三个独立组
        const group0 = new THREE.Group(); // 柱面 & 平面 (平面方程 x+y+z=1)
        const group1 = new THREE.Group(); // 柱面 & 球面
        const group2 = new THREE.Group(); // 球面A & 球面B (半径不等)
        scene.add(group0);
        scene.add(group1);
        scene.add(group2);
        group1.visible = false;
        group2.visible = false;

        // ================= 场景0：柱面 & 平面 (平面方程 x+y+z=1) =================
        // 柱面：轴线Z，半径2.8，高度9
        const cylRadius0 = 2.8;
        const cylHeight0 = 9;
        
        // 柱面
        const cylGeo0 = new THREE.CylinderGeometry(cylRadius0, cylRadius0, cylHeight0, 90, 30, true);
        const cylMat0 = new THREE.MeshPhongMaterial({ color: 0x3a6eff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const cylMesh0 = new THREE.Mesh(cylGeo0, cylMat0);
        cylMesh0.rotation.x = Math.PI / 2; // 轴线Z
        cylMesh0.position.set(0, 0, 0);
        group0.add(cylMesh0);
        // 柱面线框
        const cylWire0 = new THREE.LineSegments(new THREE.EdgesGeometry(cylGeo0), new THREE.LineBasicMaterial({ color: 0x3a6eff }));
        cylWire0.rotation.copy(cylMesh0.rotation);
        cylWire0.position.copy(cylMesh0.position);
        group0.add(cylWire0);

        // 平面：大幅加大到16x16，方程 x+y+z=1
        const planeGeo0 = new THREE.PlaneGeometry(16, 16);
        const planeMat0 = new THREE.MeshPhongMaterial({ color: 0xff5533, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const planeMesh0 = new THREE.Mesh(planeGeo0, planeMat0);
        
        // 计算旋转：默认法线(0,0,1)旋转到目标法线(1,1,1)
        const targetNormal = new THREE.Vector3(1, 1, 1).normalize();
        const defaultNormal = new THREE.Vector3(0, 0, 1);
        const axis = new THREE.Vector3().crossVectors(defaultNormal, targetNormal).normalize();
        const angle = Math.acos(defaultNormal.dot(targetNormal));
        
        planeMesh0.quaternion.setFromAxisAngle(axis, angle);
        planeMesh0.position.set(1, 0, 0);
        group0.add(planeMesh0);
        
        // 平面线框
        const planeWire0 = new THREE.LineSegments(new THREE.EdgesGeometry(planeGeo0), new THREE.LineBasicMaterial({ color: 0xff5533 }));
        planeWire0.position.copy(planeMesh0.position);
        planeWire0.quaternion.copy(planeMesh0.quaternion);
        group0.add(planeWire0);

        // 交线：x = cylRadius0 * cos(t), y = cylRadius0 * sin(t), z = 1 - x - y
        const pts0 = [];
        for (let i = 0; i <= 200; i++) {
            const t = (i / 200) * Math.PI * 2;
            const x = cylRadius0 * Math.cos(t);
            const y = cylRadius0 * Math.sin(t);
            const z = 1 - x - y;
            pts0.push(new THREE.Vector3(x, y, z));
        }
        const curve0 = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts0),
            new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 4 })
        );
        group0.add(curve0);
        
        // 标记点
        const markers0 = new THREE.Points(
            new THREE.BufferGeometry().setFromPoints(pts0.filter((_,i)=>i%15===0)),
            new THREE.PointsMaterial({ color: 0xffdd44, size: 0.3 })
        );
        group0.add(markers0);

        // ================= 场景1：柱面 & 球面 =================
        const cylRadius1 = 2.0;
        const cylHeight1 = 14;
        const sphereRadius1 = 5.0;
        const cylOffsetX = 2.5;
        
        // 柱面
        const cylGeo1 = new THREE.CylinderGeometry(cylRadius1, cylRadius1, cylHeight1, 70, 30, true);
        const cylMat1 = new THREE.MeshPhongMaterial({ color: 0x2abf8a, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const cylMesh1 = new THREE.Mesh(cylGeo1, cylMat1);
        cylMesh1.position.set(cylOffsetX, 0, 0);
        group1.add(cylMesh1);
        const cylWire1 = new THREE.LineSegments(new THREE.EdgesGeometry(cylGeo1), new THREE.LineBasicMaterial({ color: 0x2abf8a }));
        cylWire1.position.copy(cylMesh1.position);
        group1.add(cylWire1);

        // 球面
        const sphGeo1 = new THREE.SphereGeometry(sphereRadius1, 80, 40);
        const sphMat1 = new THREE.MeshPhongMaterial({ color: 0xff884d, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
        const sphMesh1 = new THREE.Mesh(sphGeo1, sphMat1);
        sphMesh1.position.set(0, 0, 0);
        group1.add(sphMesh1);
        const sphWire1 = new THREE.LineSegments(new THREE.EdgesGeometry(sphGeo1), new THREE.LineBasicMaterial({ color: 0xff884d }));
        sphWire1.position.copy(sphMesh1.position);
        group1.add(sphWire1);

        // 交线
        const pts1 = [];
        for (let i = 0; i <= 200; i++) {
            const theta = (i / 200) * Math.PI * 2;
            const x = cylOffsetX + cylRadius1 * Math.cos(theta);
            const z = cylRadius1 * Math.sin(theta);
            const underSqrt = sphereRadius1*sphereRadius1 - x*x - z*z;
            if (underSqrt >= 0.01) {
                const y = Math.sqrt(underSqrt);
                pts1.push(new THREE.Vector3(x, y, z));
            }
        }
        for (let i = 0; i <= 200; i++) {
            const theta = (i / 200) * Math.PI * 2;
            const x = cylOffsetX + cylRadius1 * Math.cos(theta);
            const z = cylRadius1 * Math.sin(theta);
            const underSqrt = sphereRadius1*sphereRadius1 - x*x - z*z;
            if (underSqrt >= 0.01) {
                const y = -Math.sqrt(underSqrt);
                pts1.push(new THREE.Vector3(x, y, z));
            }
        }
        const curve1 = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts1),
            new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 4 })
        );
        group1.add(curve1);
        
        const markers1 = new THREE.Points(
            new THREE.BufferGeometry().setFromPoints(pts1.filter((_,i)=>i%20===0)),
            new THREE.PointsMaterial({ color: 0xffaa44, size: 0.3 })
        );
        group1.add(markers1);

        // ================= 场景2：球面A & 球面B =================
        const rA = 4.8;
        const rB = 3.8;
        const d2 = 3.0;
        
        // 球A
        const sphA2Geo = new THREE.SphereGeometry(rA, 80, 40);
        const sphA2Mat = new THREE.MeshPhongMaterial({ color: 0xaa66ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
        const sphA2Mesh = new THREE.Mesh(sphA2Geo, sphA2Mat);
        sphA2Mesh.position.set(0, 0, 0);
        group2.add(sphA2Mesh);
        const sphA2Wire = new THREE.LineSegments(new THREE.EdgesGeometry(sphA2Geo), new THREE.LineBasicMaterial({ color: 0xaa66ff }));
        sphA2Wire.position.copy(sphA2Mesh.position);
        group2.add(sphA2Wire);

        // 球B
        const sphB2Geo = new THREE.SphereGeometry(rB, 80, 40);
        const sphB2Mat = new THREE.MeshPhongMaterial({ color: 0xff9966, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
        const sphB2Mesh = new THREE.Mesh(sphB2Geo, sphB2Mat);
        sphB2Mesh.position.set(d2, 0, 0);
        group2.add(sphB2Mesh);
        const sphB2Wire = new THREE.LineSegments(new THREE.EdgesGeometry(sphB2Geo), new THREE.LineBasicMaterial({ color: 0xff9966 }));
        sphB2Wire.position.copy(sphB2Mesh.position);
        group2.add(sphB2Wire);

        // 交线圆
        const h = (d2*d2 + rA*rA - rB*rB) / (2 * d2);
        const interR = Math.sqrt(rA*rA - h*h);
        
        const pts2 = [];
        for (let i = 0; i <= 80; i++) {
            const phi = (i / 80) * Math.PI * 2;
            pts2.push(new THREE.Vector3(h, interR * Math.cos(phi), interR * Math.sin(phi)));
        }
        const curve2 = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts2),
            new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 4 })
        );
        group2.add(curve2);

        const markers2 = new THREE.Points(
            new THREE.BufferGeometry().setFromPoints(pts2.filter((_,i)=>i%8===0)),
            new THREE.PointsMaterial({ color: 0xffaa44, size: 0.35 })
        );
        group2.add(markers2);

        // --- 颜色联动函数 ---
        function updateColors(color1Hex, color2Hex) {
            const col1 = parseInt(color1Hex.slice(1), 16);
            const col2 = parseInt(color2Hex.slice(1), 16);
            
            if (group0.visible) {
                cylMesh0.material.color.setHex(col1);
                cylWire0.material.color.setHex(col1);
                planeMesh0.material.color.setHex(col2);
                planeWire0.material.color.setHex(col2);
            } else if (group1.visible) {
                cylMesh1.material.color.setHex(col1);
                cylWire1.material.color.setHex(col1);
                sphMesh1.material.color.setHex(col2);
                sphWire1.material.color.setHex(col2);
            } else if (group2.visible) {
                sphA2Mesh.material.color.setHex(col1);
                sphA2Wire.material.color.setHex(col1);
                sphB2Mesh.material.color.setHex(col2);
                sphB2Wire.material.color.setHex(col2);
            }
        }

        document.getElementById('color1').addEventListener('input', (e) => {
            const col2 = document.getElementById('color2').value;
            updateColors(e.target.value, col2);
        });
        
        document.getElementById('color2').addEventListener('input', (e) => {
            const col1 = document.getElementById('color1').value;
            updateColors(col1, e.target.value);
        });

        // --- UI 切换 ---
        const btn0 = document.querySelector('[data-scene="0"]');
        const btn1 = document.querySelector('[data-scene="1"]');
        const btn2 = document.querySelector('[data-scene="2"]');
        const infoSpan = document.querySelector('#info-panel span');

        function setActiveScene(index) {
            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
            if (index === 0) btn0.classList.add('active');
            if (index === 1) btn1.classList.add('active');
            if (index === 2) btn2.classList.add('active');

            group0.visible = (index === 0);
            group1.visible = (index === 1);
            group2.visible = (index === 2);

            if (index === 0) {
                infoSpan.innerText = '柱面与平面交线 (x+y+z=1)';
                camera.position.set(10, 8, 14);
                controls.target.set(0, 0, 1);
            } else if (index === 1) {
                infoSpan.innerText = '柱面与球面交线';
                camera.position.set(11, 7, 15);
                controls.target.set(1, 0, 0);
            } else {
                infoSpan.innerText = '球面A与球面B交线';
                camera.position.set(10, 6, 16);
                controls.target.set(1.5, 0, 0);
            }
            
            const col1 = document.getElementById('color1').value;
            const col2 = document.getElementById('color2').value;
            updateColors(col1, col2);
            
            controls.update();
        }

        btn0.addEventListener('click', () => setActiveScene(0));
        btn1.addEventListener('click', () => setActiveScene(1));
        btn2.addEventListener('click', () => setActiveScene(2));

        // --- 触摸隐藏UI功能 ---
        const uiElements = document.querySelectorAll('.ui-element');
        const touchHint = document.getElementById('touch-hint');
        let hideTimeout;
        let isTouching = false;
        
        function hideUI() {
            uiElements.forEach(el => {
                el.classList.add('hidden');
            });
        }
        
        function showUI() {
            uiElements.forEach(el => {
                el.classList.remove('hidden');
            });
        }
        
        // 触摸开始事件
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 防止页面滚动
            isTouching = true;
            hideUI();
            
            // 清除之前的定时器
            if (hideTimeout) {
                clearTimeout(hideTimeout);
            }
        }, { passive: false });
        
        // 触摸结束事件
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            isTouching = false;
            
            // 延迟显示UI，避免快速触摸时闪烁
            hideTimeout = setTimeout(() => {
                if (!isTouching) {
                    showUI();
                }
            }, 300);
        });
        
        // 触摸取消事件
        renderer.domElement.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            isTouching = false;
            hideTimeout = setTimeout(() => {
                if (!isTouching) {
                    showUI();
                }
            }, 300);
        });
        
        // 鼠标事件支持（用于开发时测试）
        renderer.domElement.addEventListener('mousedown', () => {
            hideUI();
            if (hideTimeout) {
                clearTimeout(hideTimeout);
            }
        });
        
        renderer.domElement.addEventListener('mouseup', () => {
            hideTimeout = setTimeout(() => {
                showUI();
            }, 300);
        });
        
        renderer.domElement.addEventListener('mouseleave', () => {
            // 鼠标离开画布时显示UI
            if (hideTimeout) {
                clearTimeout(hideTimeout);
            }
            showUI();
        });

        // 初始显示提示，3秒后自动淡出
        setTimeout(() => {
            touchHint.style.opacity = '0';
            setTimeout(() => {
                touchHint.style.display = 'none';
            }, 500);
        }, 3000);

        // 初始激活
        setActiveScene(0);

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
